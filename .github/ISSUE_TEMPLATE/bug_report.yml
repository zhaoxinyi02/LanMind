name: Bug report
description: 报告可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明发生了什么，以及你预期看到什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: "1. 打开...\n2. 点击...\n3. 出现..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 澜灵版本
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: 操作系统
      placeholder: Windows 11 24H2
    validations:
      required: true
