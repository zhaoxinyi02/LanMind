name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "澜灵 LanMind ${{ github.ref_name }}"
          releaseBody: |
            LanMind / 澜灵 MVP 0.1 桌面端预览版。

            当前包含：首页仪表盘、模型服务配置、权限中心、账号入口、设置、桌宠窗口、系统托盘和本地 SQLite 初始化。

            这是早期开发版本。危险命令执行、文件移动和敏感数据读取尚未实现。
          releaseDraft: false
          prerelease: true
